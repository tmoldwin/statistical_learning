<text x="56.0" y="246.0" font-family="ui-monospace, Consolas, 'Courier New', monospace" font-size="18"><tspan style="fill:#2ca02c">met</tspan><tspan style="fill:#d62728">ecmaeme</tspan><tspan style="fill:#2ca02c">met</tspan><tspan style="fill:#d62728">tatcmece</tspan><tspan style="fill:#2ca02c">catcat</tspan><tspan style="fill:#d62728">emaa</tspan><tspan style="fill:#2ca02c">met</tspan><tspan style="fill:#d62728">ammamctett</tspan><tspan style="fill:#2ca02c">cat</tspan><tspan style="fill:#d62728">ctamtmt</tspan></text>
